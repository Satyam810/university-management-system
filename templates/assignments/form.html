{% extends "base.html" %}
{% block page_title %}Create Assignment{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header"><h5 class="mb-0">Create Assignment - {{ semester_course.course.code }}</h5></div>
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Create</button>
        </form>
    </div>
</div>
{% endblock %}
