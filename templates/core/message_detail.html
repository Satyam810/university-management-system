{% extends "base.html" %}
{% block page_title %}Message{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header">
        <strong>{{ message.subject }}</strong>
        <span class="text-muted">From: {{ message.sender.get_full_name|default:message.sender.username }} | {{ message.sent_at|date:"M d, Y H:i" }}</span>
    </div>
    <div class="card-body">
        <p>{{ message.body }}</p>
        <a href="{% url 'core:message_inbox' %}" class="btn btn-outline-secondary">Back</a>
    </div>
</div>
{% endblock %}
