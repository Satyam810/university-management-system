{% extends "base.html" %}
{% block page_title %}Departments{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header"><h5 class="mb-0">Departments</h5></div>
    <div class="card-body">
        <table class="table">
            <thead><tr><th>Code</th><th>Name</th></tr></thead>
            <tbody>
            {% for d in departments %}
            <tr><td>{{ d.code }}</td><td>{{ d.name }}</td></tr>
            {% empty %}
            <tr><td colspan="2">No departments</td></tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
