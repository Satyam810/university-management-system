{% extends "base.html" %}
{% block page_title %}Courses{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header"><h5 class="mb-0">Courses</h5></div>
    <div class="card-body">
        <table class="table">
            <thead><tr><th>Code</th><th>Name</th><th>Department</th><th>Credits</th></tr></thead>
            <tbody>
            {% for c in courses %}
            <tr><td>{{ c.code }}</td><td>{{ c.name }}</td><td>{{ c.department.name }}</td><td>{{ c.credits }}</td></tr>
            {% empty %}
            <tr><td colspan="4">No courses</td></tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
