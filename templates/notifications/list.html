{% extends "base.html" %}
{% block page_title %}Notifications{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header"><h5 class="mb-0">Notifications</h5></div>
    <div class="card-body">
        {% for n in notifications %}
        <a href="{% url 'notifications:mark_read' n.id %}" class="list-group-item list-group-item-action {% if not n.is_read %}list-group-item-primary{% endif %}">
            <strong>{{ n.title }}</strong>
            <p class="mb-0 small">{{ n.message }}</p>
            <span class="text-muted">{{ n.created_at|date:"M d, H:i" }}</span>
        </a>
        {% empty %}
        <p class="text-muted">No notifications.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
